server:
  port: 9002

spring:
  boot:
    admin:
      client:
        url: http://localhost:7779
  application:
    name: hrshop-web

  datasource:
    url: jdbc:mysql://192.168.178.135:3307/springcloud?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: 123456

  jpa:
    show-sql: true
    hibernate:
      ddl-auto: none

  cloud:
    discovery:
      client:
        composite-indicator:
          enabled: true
    loadbalancer:
      retry:
        enabled: false
    openfeign:
      circuitbreaker:
        enabled: true

  rabbitmq:
    host: 192.168.178.135
    port: 5672
    username: guest
    password: guest
    virtual-host: /

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8888/eureka
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always

springdoc:
  swagger-ui:
    path: /swagger-ui.html
